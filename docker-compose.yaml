services:
  scylla:
    image: scylladb/scylla:6.1.2
    restart: unless-stopped
    command: >
      --smp 4
      --memory 8G
      --overprovisioned 1
      --api-address 0.0.0.0
      --broadcast-rpc-address 127.0.0.1
    ports:
      - "9042:9042" # CQL native transport
      - "19042:19042" # Shard-aware port
      - "10000:10000" # REST API (useful for inspecting state)
    volumes:
      - scylla-data:/var/lib/scylla
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  scylla-data:
