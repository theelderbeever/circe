services:
  scylla1:
    container_name: scylla1
    image: scylladb/scylla:6.1.2
    restart: always
    command: --seeds=scylla1,scylla2 --reactor-backend=epoll --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9042:9042"
      - "19042:19042"

  scylla2:
    container_name: scylla2
    image: scylladb/scylla:6.1.2
    restart: always
    command: --seeds=scylla1,scylla2 --reactor-backend=epoll --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9043:9042"

  scylla3:
    container_name: scylla3
    image: scylladb/scylla:6.1.2
    restart: always
    command: --seeds=scylla1,scylla2 --reactor-backend=epoll --smp 1 --memory 750M --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9044:9042"

  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "19000:9000" # S3 API
      - "19001:9001" # Web Console
    environment:
      RUSTFS_ACCESS_KEY: admin
      RUSTFS_SECRET_KEY: password
    volumes:
      - rustfs-data:/data
    command: ["--address", ":9000", "--console-address", ":9001", "/data"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  scylla:
  scylla-mutant:
  rustfs-data:
